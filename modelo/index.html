<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pessoas</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

    <section class="container">
        <h1>Cadastro de Pessoas</h1>

        <form class="form">
            <label for="nome">Nome</label>
            <input type="text" id="nome" class="nome" placeholder="Digite seu nome">

            <label for="sobrenome">Sobrenome</label>
            <input type="text" id="sobrenome" class="sobrenome" placeholder="Digite seu sobrenome">

            <label for="peso">Peso</label>
            <input type="number" id="peso" class="peso" placeholder="Digite seu peso">

            <label for="altura">Altura</label>
            <input type="number" step="0.01" id="altura" class="altura" placeholder="Digite sua altura">

            <button type="submit">Enviar</button>
        </form>

        <div class="resultado"></div>
    </section>

    <script src="./assets/js/main.js"></script>

</body>

</html>
