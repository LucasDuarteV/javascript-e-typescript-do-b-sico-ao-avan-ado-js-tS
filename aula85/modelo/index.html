<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>

    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

    <section class="container">
        <h1>Formulário de Cadastro</h1>

        <ul>
            <li>Nenhum campo pode estar vazio.</li>
            <li>Usuário só poderá conter letras e/ou números.</li>
            <li>Usuário deverá ter entre 3 e 12 caracteres.</li>
            <li>Senha precisa ter entre 6 e 12 caracteres.</li>
        </ul>

        <form action="/" method="POST" class="formulario">

            <label for="nome">Nome</label>
            <input
                type="text"
                id="nome"
                class="validar nome"
                required
            >

            <label for="sobrenome">Sobrenome</label>
            <input
                type="text"
                id="sobrenome"
                class="validar sobrenome"
                required
            >

            <label for="cpf">CPF</label>
            <input
                type="text"
                id="cpf"
                class="validar cpf"
                required
            >

            <label for="usuario">Usuário</label>
            <input
                type="text"
                id="usuario"
                class="validar usuario"
                required
            >

            <label for="senha">Senha</label>
            <input
                type="password"
                id="senha"
                class="validar senha"
                required
            >

            <label for="repetir-senha">Repetir Senha</label>
            <input
                type="password"
                id="repetir-senha"
                class="validar repetir-senha"
                required
            >

            <button type="submit">Enviar</button>

        </form>
    </section>

    <!-- Primeiro a classe ValidaCPF -->
    <script src="./assets/js/ValidaCPF.js"></script>

    <!-- Depois o main.js -->
    <script src="./assets/js/main.js"></script>

</body>

</html>
